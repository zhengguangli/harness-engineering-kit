name: skill-triggers
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  enforce-developer-flow:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Ensure PR source is developer branch
        run: |
          head="${{ github.head_ref }}"
          if [ "$head" != "developer" ]; then
            echo "::error::PR must be opened from developer branch (current: $head)"
            exit 1
          fi
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate skill trigger sections
        run: ./scripts/validate-skill-triggers.sh
